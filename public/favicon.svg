<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="orbit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e2e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Central planet -->
  <circle cx="50" cy="50" r="20" fill="url(#orbit-gradient)"/>
  <!-- Orbit ring -->
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#e2e2e2" stroke-width="3" opacity="0.8" transform="rotate(-20 50 50)"/>
  <!-- Small orbiting dot -->
  <circle cx="85" cy="42" r="5" fill="#e2e2e2"/>
</svg>
